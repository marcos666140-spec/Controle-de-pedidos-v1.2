<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pedidos</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
</head>
<body>

<header>
  <h1>🛒 Pedidos</h1>
</header>

<div id="tabs"></div>
<button class="addSetor" onclick="novoSetor()">+ Setor</button>
<div id="conteudo"></div>

<!-- Modal do pedido -->
<div id="modalPedido">
  <div id="modalConteudo">
    <button class="fechar" onclick="fecharModal()">X</button>
    <div id="modalPedidos"></div>
    <button id="copiarPedido">Copiar Pedido</button>
  </div>
</div>

<button class="finalizar" onclick="finalizarPedido()">
  ✔
</button>

<script src="script.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
